<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripció confirmada – Arrossada Popular</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#c0281e">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f5ede0;
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: #c0281e;
            color: #f5ede0;
            border: 3px solid #1a1a1a;
            box-shadow: 8px 8px 0 #1a1a1a;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .checkmark {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .divider {
            border: none;
            border-top: 2px solid rgba(245,237,224,0.4);
            margin: 1.5rem 0;
        }

        .details {
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            opacity: 0.9;
            line-height: 1.8;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.7rem 1.5rem;
            background: #f5ede0;
            color: #c0281e;
            border: 2px solid #1a1a1a;
            box-shadow: 3px 3px 0 #1a1a1a;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-decoration: none;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .back-link:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">✓</div>
        <h1>Inscripció<br>Confirmada!</h1>
        <p>Gràcies! Ens veiem el <strong>23 de Maig</strong> al Firal d'Esterri.</p>
        <hr class="divider">
        <div class="details">
            <p>A partir de les 12:30h</p>
            <p>Aperitiu · Arròs · Postres · Vi i Aigua</p>
            <p><strong>15 € per persona — porta efectiu</strong></p>
            <p>⚠ Recorda portar <strong>plat, got i coberts</strong></p>
        </div>
        <a href="/arrossada.html" class="back-link">← Tornar al formulari</a>
    </div>
</body>
</html>
